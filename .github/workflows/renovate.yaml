---
name: Renovate

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yaml"
  # trigger renovate post push to maain
  # to give renovate a chance to update their PRs
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "42 11 * * 3"

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["bazelModDeps"]'
          RENOVATE_DRY_RUN: ${{ github.event_name == 'pull_request' && 'full' || '' }}
          # github.head_ref is only available in pull requests, in all other events use config from main branch
          RENOVATE_BASE_BRANCH_PATTERNS: ${{ format('["{0}"]', github.head_ref || 'main') }}
          RENOVATE_USE_BASE_BRANCH_CONFIG: ${{ github.event_name == 'pull_request' && 'merge' || 'none' }}
          RENOVATE_REPOSITORIES: ${{ format('["{0}"]', github.repository) }}
